<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>LLM Relay Manager · Models</title>
    <link rel="stylesheet" href="/static/styles.css">
  </head>
  <body data-page="models">
    <div class="shell">
      <aside class="sidebar">
        <a class="brand" href="/">LLM Relay Manager</a>
        <nav class="nav">
          <a href="/" data-nav="dashboard">工作台</a>
          <a href="/stations" data-nav="stations">站点</a>
          <a href="/models" data-nav="models">模型</a>
          <a href="/history" data-nav="history">记录</a>
        </nav>
      </aside>
      <main class="content">
        <header class="page-titlebar">
          <div>
            <h1>模型</h1>
          </div>
        </header>
        <section class="panel models-panel">
          <form id="search-form" class="models-filters">
            <div class="filter-row primary">
              <label class="grow">
                <span>模型名</span>
                <input name="q" placeholder="gpt-5 / qwen / glm ...">
              </label>
              <label>
                <span>站点</span>
                <select name="station_id" id="models-station-select">
                  <option value="">全部站点</option>
                </select>
              </label>
              <label>
                <span>协议</span>
                <select name="protocol_label" id="models-protocol-select">
                  <option value="">全部协议</option>
                </select>
              </label>
              <label>
                <span>可用</span>
                <select name="available">
                  <option value="">全部</option>
                  <option value="1">可用</option>
                  <option value="0">不可用</option>
                  <option value="unchecked">未检查</option>
                </select>
              </label>
              <button type="button" id="reset-search-btn" class="button small ghost">重置</button>
            </div>

            <div class="filter-quick-row">
              <span class="quick-chip-label">快捷：</span>
              <button type="button" class="quick-chip" data-preset="available">只看可用</button>
              <button type="button" class="quick-chip" data-preset="error">有错误</button>
              <button type="button" class="quick-chip" data-preset="unchecked">未检查</button>
              <button type="button" class="quick-chip" data-preset="slow">延迟 &gt; 3s</button>
              <button type="button" class="quick-chip" data-preset="perfect">成功率 100%</button>
              <details class="adv-filter-toggle">
                <summary>高级筛选</summary>
                <div class="filter-row secondary">
                  <label>
                    <span>Key</span>
                    <select name="key_id" id="models-key-select">
                      <option value="">全部 Key</option>
                    </select>
                  </label>
                  <label>
                    <span>支持</span>
                    <select name="supported">
                      <option value="">全部</option>
                      <option value="1">支持</option>
                      <option value="0">不支持</option>
                    </select>
                  </label>
                  <label>
                    <span>状态</span>
                    <select name="status">
                      <option value="">全部</option>
                      <option value="ok">ok</option>
                      <option value="partial">partial</option>
                      <option value="empty">empty</option>
                      <option value="error">error</option>
                      <option value="unchecked">unchecked</option>
                    </select>
                  </label>
                  <label>
                    <span>模型启用</span>
                    <select name="enabled">
                      <option value="">全部</option>
                      <option value="1">已启用</option>
                      <option value="0">已禁用</option>
                    </select>
                  </label>
                  <label>
                    <span>成功率下限</span>
                    <input name="min_success_rate" type="number" min="0" max="100" step="0.1" placeholder="0-100">
                  </label>
                  <label>
                    <span>成功率上限</span>
                    <input name="max_success_rate" type="number" min="0" max="100" step="0.1" placeholder="0-100">
                  </label>
                  <label>
                    <span>延迟下限 ms</span>
                    <input name="min_latency_ms" type="number" min="0" step="1" placeholder="500">
                  </label>
                  <label>
                    <span>延迟上限 ms</span>
                    <input name="max_latency_ms" type="number" min="0" step="1" placeholder="5000">
                  </label>
                  <label>
                    <span>预览包含</span>
                    <input name="preview" placeholder="ok / reasoning">
                  </label>
                  <label>
                    <span>错误包含</span>
                    <input name="error" placeholder="timeout / rate limit">
                  </label>
                </div>
              </details>
            </div>

            <input type="hidden" name="sort_by" value="model_id">
            <input type="hidden" name="sort_dir" value="asc">
            <input type="hidden" name="available_only" value="">
          </form>

          <div class="models-toolbar">
            <div class="view-toggle" role="tablist">
              <button type="button" class="view-tab active" data-view="detail">明细</button>
              <button type="button" class="view-tab" data-view="group">按模型汇总</button>
            </div>
            <div class="models-summary" id="models-search-summary">等待搜索...</div>
            <div class="models-pagesize">
              <label>
                <span>每页</span>
                <select id="models-page-size">
                  <option value="50">50</option>
                  <option value="100">100</option>
                  <option value="200">200</option>
                  <option value="0">全部</option>
                </select>
              </label>
            </div>
          </div>

          <div class="table-wrap" id="models-table-wrap">
            <table class="models-table" id="models-detail-table">
              <thead>
                <tr>
                  <th><button type="button" class="table-sort" data-sort="model_id">模型</button></th>
                  <th><button type="button" class="table-sort" data-sort="station_name">站点</button></th>
                  <th><button type="button" class="table-sort" data-sort="key_name">Key</button></th>
                  <th><button type="button" class="table-sort" data-sort="protocol_label">协议</button></th>
                  <th><button type="button" class="table-sort" data-sort="model_enabled">启用</button></th>
                  <th><button type="button" class="table-sort" data-sort="supported">支持</button></th>
                  <th><button type="button" class="table-sort" data-sort="status">状态</button></th>
                  <th><button type="button" class="table-sort" data-sort="available">可用</button></th>
                  <th><button type="button" class="table-sort" data-sort="history_success_rate">成功率</button></th>
                  <th><button type="button" class="table-sort" data-sort="latency_ms">延迟</button></th>
                  <th>预览</th>
                  <th>错误</th>
                </tr>
              </thead>
              <tbody id="search-results"></tbody>
            </table>
            <table class="models-table" id="models-group-table" hidden>
              <thead>
                <tr>
                  <th><button type="button" class="table-sort" data-group-sort="model_id">模型</button></th>
                  <th><button type="button" class="table-sort" data-group-sort="total">出现次数</button></th>
                  <th><button type="button" class="table-sort" data-group-sort="stations">站点数</button></th>
                  <th><button type="button" class="table-sort" data-group-sort="keys">Key 数</button></th>
                  <th><button type="button" class="table-sort" data-group-sort="protocols">协议数</button></th>
                  <th><button type="button" class="table-sort" data-group-sort="available">可用</button></th>
                  <th><button type="button" class="table-sort" data-group-sort="best_rate">最佳成功率</button></th>
                  <th><button type="button" class="table-sort" data-group-sort="best_latency">最佳延迟</button></th>
                </tr>
              </thead>
              <tbody id="group-results"></tbody>
            </table>
          </div>

          <div class="pagination" id="models-pagination" hidden>
            <button type="button" class="button small ghost" data-page="prev">上一页</button>
            <span id="models-page-info">1 / 1</span>
            <button type="button" class="button small ghost" data-page="next">下一页</button>
          </div>
        </section>
      </main>
    </div>
    <script src="/static/common.js"></script>
    <script src="/static/models.js"></script>
  </body>
</html>
