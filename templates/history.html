<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>LLM Relay Manager · History</title>
    <link rel="stylesheet" href="/static/styles.css">
  </head>
  <body data-page="history">
    <div class="shell">
      <aside class="sidebar">
        <a class="brand" href="/">LLM Relay Manager</a>
        <nav class="nav">
          <a href="/" data-nav="dashboard">工作台</a>
          <a href="/stations" data-nav="stations">站点</a>
          <a href="/models" data-nav="models">模型</a>
          <a href="/history" data-nav="history">记录</a>
        </nav>
      </aside>
      <main class="content">
        <header class="page-titlebar">
          <div>
            <h1>记录</h1>
          </div>
        </header>
        <section class="panel compact">
          <div class="panel-head">
            <h2>调度</h2>
            <form id="scheduler-form" class="inline-form">
              <label class="inline-check">
                <input type="checkbox" name="enabled">
                <span>启用后台调度</span>
              </label>
              <label class="inline-field">
                <span>间隔</span>
                <input name="interval_minutes" type="number" min="1" max="1440" value="60">
                <span class="suffix">分钟</span>
              </label>
              <button type="submit" class="button small primary">保存</button>
              <button type="button" id="run-cycle-btn" class="button small">立即跑一轮</button>
              <div id="scheduler-status" class="scheduler-status inline"></div>
            </form>
          </div>
        </section>

        <section class="panel">
          <div class="panel-head">
            <h2>后台任务</h2>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>创建时间</th>
                  <th>ID</th>
                  <th>任务</th>
                  <th>状态</th>
                  <th>进度</th>
                  <th>当前步骤</th>
                  <th>错误</th>
                </tr>
              </thead>
              <tbody id="jobs-table"></tbody>
            </table>
          </div>
        </section>

        <section class="panel">
          <div class="panel-head">
            <h2>检查记录</h2>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>时间</th>
                  <th>模型</th>
                  <th>站点</th>
                  <th>Key</th>
                  <th>协议</th>
                  <th>状态</th>
                  <th>可用</th>
                  <th>线路</th>
                  <th>延迟</th>
                  <th>错误</th>
                </tr>
              </thead>
              <tbody id="history-table"></tbody>
            </table>
          </div>
        </section>
      </main>
    </div>
    <script src="/static/common.js"></script>
    <script src="/static/history.js"></script>
  </body>
</html>
