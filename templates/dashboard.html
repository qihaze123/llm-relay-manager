<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>LLM Relay Manager · Dashboard</title>
    <link rel="stylesheet" href="/static/styles.css">
  </head>
  <body data-page="dashboard">
    <div class="shell">
      <aside class="sidebar">
        <a class="brand" href="/">LLM Relay Manager</a>
        <nav class="nav">
          <a href="/" data-nav="dashboard">工作台</a>
          <a href="/stations" data-nav="stations">站点</a>
          <a href="/models" data-nav="models">模型</a>
          <a href="/history" data-nav="history">记录</a>
        </nav>
      </aside>
      <main class="content">
        <header class="page-titlebar">
          <div>
            <h1>工作台</h1>
          </div>
          <div class="page-head-actions">
            <button id="run-cycle-btn" class="button primary">运行巡检</button>
          </div>
        </header>

        <section class="panel workbench-status">
          <div class="panel-head">
            <h2>当前状态</h2>
            <div id="health-badge"></div>
          </div>
          <div class="stat-strip" id="summary-grid"></div>
          <div class="action-list action-list-inline">
            <a class="action-item" href="/stations">
              <strong>站点和 Key</strong>
              <span>增删中转站、展开站点处理 Key</span>
            </a>
            <a class="action-item" href="/models?available=0">
              <strong>不可用模型</strong>
              <span>定位失败模型和错误原因</span>
            </a>
            <a class="action-item" href="/history">
              <strong>记录</strong>
              <span>查看调度、任务和检查历史</span>
            </a>
          </div>
        </section>

        <section class="panel">
          <div class="panel-head">
            <h2>需要处理</h2>
          </div>
          <div id="issue-list" class="issue-list"></div>
        </section>

        <section class="panel">
          <div class="panel-head">
            <h2>站点概览</h2>
          </div>
          <div id="station-overview" class="station-overview"></div>
        </section>

        <section class="panel">
          <div class="panel-head">
            <h2>最近检查</h2>
          </div>
          <div class="table-wrap">
            <table class="models-table">
              <thead>
                <tr>
                  <th>时间</th>
                  <th>模型</th>
                  <th>站点</th>
                  <th>Key</th>
                  <th>协议</th>
                  <th>状态</th>
                  <th>可用</th>
                  <th>延迟</th>
                </tr>
              </thead>
              <tbody id="history-table"></tbody>
            </table>
          </div>
        </section>
      </main>
    </div>
    <script src="/static/common.js"></script>
    <script src="/static/dashboard.js"></script>
  </body>
</html>
