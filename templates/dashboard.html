<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>LLM Relay Manager · Dashboard</title>
    <link rel="stylesheet" href="/static/styles.css">
  </head>
  <body data-page="dashboard">
    <div class="shell">
      <aside class="sidebar">
        <a class="brand" href="/">LLM Relay Manager</a>
        <nav class="nav">
          <a href="/" data-nav="dashboard">Dashboard</a>
          <a href="/stations" data-nav="stations">Stations</a>
          <a href="/keys" data-nav="keys">Keys</a>
          <a href="/models" data-nav="models">Models</a>
          <a href="/history" data-nav="history">History</a>
        </nav>
      </aside>
      <main class="content">
        <section class="dashboard-topbar">
          <div class="stat-strip" id="summary-grid"></div>
          <div class="dashboard-actions">
            <button id="run-cycle-btn" class="button primary">跑完整探测周期</button>
            <a class="button" href="/keys">去管理 Keys</a>
          </div>
        </section>

        <section class="panel compact">
          <div class="panel-head">
            <h2>调度状态</h2>
            <div id="scheduler-status" class="scheduler-status inline"></div>
          </div>
        </section>

        <section class="panel">
          <div class="panel-head">
            <div>
              <h2>最近历史</h2>
              <p>最近 12 条模型检查记录。</p>
            </div>
          </div>
          <div class="table-wrap">
            <table class="models-table">
              <thead>
                <tr>
                  <th>时间</th>
                  <th>模型</th>
                  <th>站点</th>
                  <th>Key</th>
                  <th>协议</th>
                  <th>状态</th>
                  <th>可用</th>
                  <th>延迟</th>
                </tr>
              </thead>
              <tbody id="history-table"></tbody>
            </table>
          </div>
        </section>
      </main>
    </div>
    <script src="/static/common.js"></script>
    <script src="/static/dashboard.js"></script>
  </body>
</html>
